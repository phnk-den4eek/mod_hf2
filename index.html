<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wasnous - half life mods!</title>
  <link rel="stylesheet" href="./untitled-fig-export.css">
  <style>
    :root {
      --panel: rgba(232, 236, 238, 0.92);
      --panel-line: rgba(255, 255, 255, 0.34);
      --page: #efc2ab;
      --text: #151515;
      --shadow: rgba(56, 28, 16, 0.18);
      --card-shadow: rgba(47, 24, 15, 0.18);
      --frame-fill: rgba(232, 236, 238, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--page);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    button {
      font: inherit;
      appearance: none;
    }

    .page {
      position: relative;
      width: min(100%, 390px);
      min-height: min(92vh, 980px);
      padding: 24px 16px 30px;
      overflow: hidden;
      background: linear-gradient(rgba(239, 194, 171, 0.58), rgba(239, 194, 171, 0.58));
      box-shadow: 0 22px 60px var(--shadow);
      isolation: isolate;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/background-photo.png") center/cover no-repeat;
      opacity: 0.52;
      z-index: -2;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0) 28%,
          rgba(255, 255, 255, 0.15) 56%,
          rgba(255, 255, 255, 0) 78%
        ),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0));
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: -1;
    }

    .dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(205, 215, 221, 0.95);
      margin-left: 6px;
      margin-bottom: 32px;
      box-shadow: 0 8px 14px rgba(255, 255, 255, 0.25) inset;
    }

    .hero {
      text-align: center;
    }

    .pill {
      width: min(100%, 262px);
      margin: 0 auto;
      padding: 10px 18px;
      text-align: center;
      background: var(--panel);
      border-radius: 8px;
      box-shadow:
        0 4px 14px rgba(255, 255, 255, 0.18) inset,
        0 8px 18px rgba(56, 28, 16, 0.08);
    }

    .title {
      font-size: clamp(16px, 3.8vw, 22px);
      font-weight: 800;
      line-height: 1.1;
      text-transform: lowercase;
    }

    .lead {
      width: min(100%, 286px);
      margin: 28px auto 0;
      text-align: center;
      font-size: 11px;
      line-height: 1.3;
      font-weight: 700;
    }

    .download-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 188px;
      margin-top: 88px;
      padding: 11px 22px;
      border: 0;
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      box-shadow:
        0 4px 14px rgba(255, 255, 255, 0.18) inset,
        0 10px 18px rgba(56, 28, 16, 0.1);
    }

    .shot-strip {
      width: min(100%, 238px);
      margin: 30px auto 30px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .shot-frame {
      position: relative;
      aspect-ratio: 1 / 0.72;
      border-radius: 7px;
      border: 2px solid rgba(232, 236, 238, 0.95);
      background: var(--frame-fill);
      box-shadow:
        inset 0 0 0 1px var(--panel-line),
        0 8px 18px rgba(47, 24, 15, 0.12);
      overflow: hidden;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .shot-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          135deg,
          transparent 0 16%,
          rgba(232, 236, 238, 0.34) 16% 19%,
          transparent 19% 100%
        );
    }

    .shot-frame:hover {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.98);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.28),
        0 12px 24px rgba(47, 24, 15, 0.18);
    }

    .shot-frame img,
    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shot-frame--filled::before {
      display: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 26px;
    }

    .gallery-copy {
      display: flex;
      justify-content: center;
    }

    .copy {
      width: min(100%, 180px);
      margin: 0;
      text-align: center;
      font-size: clamp(15px, 4.6vw, 22px);
      line-height: 0.98;
      font-weight: 500;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px 18px;
    }

    .gallery-card {
      width: 100%;
      aspect-ratio: 1 / 0.72;
      border: 0;
      padding: 0;
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(rgba(232, 236, 238, 0.34), rgba(232, 236, 238, 0.34)),
        url("file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/preview-shot.png") center/cover no-repeat;
      box-shadow: 0 12px 28px var(--card-shadow);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .gallery-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 32px rgba(47, 24, 15, 0.24);
    }

    .gallery-card--filled {
      background: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(16, 11, 8, 0.82);
      z-index: 20;
    }

    .lightbox[hidden] {
      display: none;
    }

    .lightbox-image {
      max-width: min(92vw, 900px);
      max-height: 82vh;
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    .lightbox-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 420px) {
      .page {
        padding-top: 12px;
        padding-left: 10px;
        padding-right: 10px;
      }

      .download-button {
        margin-top: 72px;
      }

      .shot-strip {
        margin-top: 24px;
      }

      .gallery {
        gap: 22px;
      }

      .gallery-grid {
        gap: 18px 12px;
      }

      .copy {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="dot" aria-hidden="true"></div>

    <section class="hero">
      <div class="pill title">wasnous - half life mods!</div>

      <p class="lead">
        Найкращий контент за адекватною ціною.<br>
        Візуальні приклади, акуратна подача і стильний вигляд уже всередині.<br>
        Усе зібрано так, щоб виглядало модно, чисто й зручно.
      </p>

      <a class="download-button" href="file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/background-photo.png" download="washous-background.png">Скачати</a>

      <div class="shot-strip" id="shotStrip" aria-label="Маленькі рамки для скріншотів"></div>
    </section>

    <section class="gallery">
      <div class="gallery-copy">
        <p class="copy">
          Ось фото приклади наших модів, усе стильно, модно і зручно!
        </p>
      </div>

      <div class="gallery-grid" id="galleryGrid" aria-label="Приклади модів"></div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Закрити">&times;</button>
    <img class="lightbox-image" id="lightboxImage" alt="Перегляд скріншота">
  </div>

  <script>
    const screenshotImages = [
      "file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/preview-shot.png",
      "file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/background-photo.png",
      "file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/preview-shot.png",
      "file:///C:/Users/%D0%B0%D0%BF%D0%B5%D0%BDic/Documents/Codex/2026-04-23-files-mentioned-by-the-user-untitled/background-photo.png"
    ];

    const shotStrip = document.getElementById("shotStrip");
    const galleryGrid = document.getElementById("galleryGrid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxClose = document.getElementById("lightboxClose");

    function openLightbox(src) {
      lightboxImage.src = src;
      lightbox.hidden = false;
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.hidden = true;
      lightboxImage.removeAttribute("src");
      document.body.style.overflow = "";
    }

    function createImageElement(src, alt) {
      const image = document.createElement("img");
      image.src = src;
      image.alt = alt;
      image.loading = "lazy";
      return image;
    }

    function renderShotFrames() {
      screenshotImages.slice(0, 3).forEach((src, index) => {
        const frame = document.createElement("button");
        frame.className = "shot-frame shot-frame--filled";
        frame.type = "button";
        frame.setAttribute("aria-label", `Відкрити скріншот ${index + 1}`);
        frame.appendChild(createImageElement(src, `Скріншот ${index + 1}`));
        frame.addEventListener("click", () => openLightbox(src));
        shotStrip.appendChild(frame);
      });
    }

    function renderGallery() {
      screenshotImages.forEach((src, index) => {
        const card = document.createElement("button");
        card.className = "gallery-card gallery-card--filled";
        card.type = "button";
        card.setAttribute("aria-label", `Переглянути приклад ${index + 1}`);
        card.appendChild(createImageElement(src, `Приклад моду ${index + 1}`));
        card.addEventListener("click", () => openLightbox(src));
        galleryGrid.appendChild(card);
      });
    }

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) {
        closeLightbox();
      }
    });

    lightboxClose.addEventListener("click", closeLightbox);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !lightbox.hidden) {
        closeLightbox();
      }
    });

    renderShotFrames();
    renderGallery();
  </script>
</body>
</html>
